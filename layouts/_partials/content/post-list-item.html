{{/* Post list item template for section pages */}}
{{- $ctx := index . "$" -}}
{{- $pages := $ctx.Pages -}}
{{- with $pages -}}
	<div class="space-y-1">
		{{ range . }}
		<div class="flex items-baseline gap-4 py-1.5">
			<time class="text-sm text-gray-400 dark:text-gray-500 shrink-0 w-10 tabular-nums" datetime="{{ .PublishDate.Format "2006-01-02T15:04:05-07:00" }}">
				{{ .PublishDate.Format "01/02" }}
			</time>
			<a href="{{ .RelPermalink }}" class="hover:underline decoration-gray-400 underline-offset-2">
				{{ .LinkTitle }}
			</a>
		</div>
		{{ end }}
	</div>
{{ end }}
