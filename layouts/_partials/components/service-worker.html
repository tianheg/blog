{{- with resources.Get "ts/sw.ts" }}
  {{- $opts := dict "targetPath" "sw.js" -}}
  {{- if hugo.IsDevelopment }}
    {{- with . | js.Build $opts }}
      <script>
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('{{ .RelPermalink }}');
          });
        }
      </script>
    {{- end }}
  {{- else }}
    {{- $opts = merge $opts (dict "minify" true) -}}
    {{- with . | js.Build $opts }}
      <script>
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('{{ .RelPermalink }}');
          });
        }
      </script>
    {{- end }}
  {{- end }}
{{- end }}
