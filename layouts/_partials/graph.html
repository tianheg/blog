{{/* Render the interactive network graph web component */}}
{{/* 
   Parameters:
   - class: CSS height class (default: h-96)
   - page: Current page object (optional) - when provided, shows subgraph centered on this page
*/}}
<content-network-graph
  class="{{ .class | default "h-96" }}"
  data-endpoint="{{ relURL "graph/index.json" }}"
  {{ with .page }}page="{{ .RelPermalink }}"{{ end }}
></content-network-graph>
