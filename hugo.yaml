baseURL: "https://tianheg.co/"
pluralizeListTitles: false
summaryLength: 42
title: "Tianhe Gao"

build:
  cachebusters:
    - source: "layouts/.*"
      target: css

frontmatter:
  date:
    - date
    - :filename
    - :default
  lastmod:
    - lastmod
    - :git
    - :fileModTime
    - :default

markup:
  highlight:
    style: dracula
  tableOfContents:
    startLevel: 2
    endLevel: 3
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - name: Home
      pageRef: "/"
      weight: 1
    - name: TIL
      pageRef: "/til"
      weight: 9
    - name: Projects
      pageRef: "/projects"
      weight: 10
    - name: Service
      pageRef: "/service"
      weight: 11
    - name: Posts
      pageRef: "/posts"
      weight: 13
    - name: Graph
      pageRef: "/graph"
      weight: 14

outputFormats:
  SectionsRSS:
    baseName: index
    mediaType: "application/rss+xml"

outputs:
  home:
    - HTML
    - SectionsRSS
  page:
    - HTML
  section:
    - HTML
    - JSON
  taxonomy:
    - HTML
  term:
    - HTML


permalinks:
  tags: "/tags/:slug/"

services:
  rss:
    limit: 10

taxonomies:
  tag: "tags"
